<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Career Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">🤖</div>
            <h1>AI Career Assistant</h1>
            <p class="auth-subtitle">Your personal career guide</p>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position:relative">
                        <input type="password" name="password" id="login-password" placeholder="Enter your password" required style="padding-right:3rem">
                        <span onclick="togglePassword('login-password', this)" style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;user-select:none;">👁️</span>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p class="auth-link">Don't have an account? <a href="/signup">Sign Up</a></p>
        </div>
    </div>
    <script>
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = '🙈';
        } else {
            input.type = 'password';
            icon.textContent = '👁️';
        }
    }
    </script>
</body>
</html>
