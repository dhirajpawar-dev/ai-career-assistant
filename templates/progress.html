<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - AI Career Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🤖 AI Career Assistant</div>
        <div class="nav-links">
            <a href="/dashboard">🎯 Goal</a>
            <a href="/progress" class="active">✅ Progress</a>
            <a href="/chat">💬 Chat</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>✅ Progress Tracker</h1>
        {% if goal_data %}
        <p class="subtitle">Tracking: <strong>{{ goal_data[0] }}</strong></p>
        {% endif %}

        <div class="card">
            <h2>Overall Progress</h2>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: {{ percentage }}%"></div>
            </div>
            <p>{{ completed }} of {{ total }} tasks completed ({{ percentage }}%)</p>
        </div>

        <div class="card">
            <h2>Add New Task</h2>
            <div class="task-input-row">
                <input type="text" id="new-task" placeholder="e.g. Complete Python basics course">
                <button class="btn-primary" onclick="addTask()">Add Task</button>
            </div>
        </div>

        <div class="card">
            <h2>My Tasks</h2>
            <div id="tasks-list">
                {% for task in tasks %}
                <div class="task-item {% if task[2] %}completed{% endif %}" id="task-{{ task[0] }}">
                    <input type="checkbox" 
                        {% if task[2] %}checked{% endif %}
                        onchange="updateTask({{ task[0] }}, this.checked)">
                    <span class="task-text">{{ task[1] }}</span>
                    <button class="btn-delete" onclick="deleteTask({{ task[0] }})">🗑️</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        async function addTask() {
            const task = document.getElementById('new-task').value;
            if (!task) return;

            await fetch('/add-task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task})
            });

            window.location.reload();
        }

        async function updateTask(taskId, completed) {
            await fetch('/update-task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task_id: taskId, completed})
            });
            window.location.reload();
        }

        async function deleteTask(taskId) {
            if (!confirm('Delete this task?')) return;
            await fetch('/delete-task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task_id: taskId})
            });
            window.location.reload();
        }

        document.getElementById('new-task').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
